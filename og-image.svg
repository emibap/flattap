<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#162448"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </radialGradient>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0f2a54"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="discClip">
      <circle cx="880" cy="315" r="270"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="60" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="120" cy="90" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="450" cy="20" r="2" fill="white" opacity="0.4"/>
  <circle cx="100" cy="180" r="1" fill="white" opacity="0.5"/>
  <circle cx="300" cy="140" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="1100" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1050" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="1150" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="50" cy="500" r="1" fill="white" opacity="0.4"/>
  <circle cx="150" cy="560" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="250" cy="590" r="1" fill="white" opacity="0.3"/>
  <circle cx="400" cy="540" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1080" cy="550" r="1" fill="white" opacity="0.6"/>
  <circle cx="1160" cy="480" r="1.5" fill="white" opacity="0.4"/>

  <!-- Disc glow -->
  <circle cx="880" cy="315" r="300" fill="url(#glow)"/>

  <!-- Main disc -->
  <circle cx="880" cy="315" r="270" fill="url(#disc)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Graticule lines (simplified) -->
  <g clip-path="url(#discClip)" opacity="0.08" stroke="white" stroke-width="0.8" fill="none">
    <circle cx="880" cy="315" r="54"/>
    <circle cx="880" cy="315" r="108"/>
    <circle cx="880" cy="315" r="162"/>
    <circle cx="880" cy="315" r="216"/>
    <circle cx="880" cy="315" r="270"/>
    <line x1="610" y1="315" x2="1150" y2="315"/>
    <line x1="880" y1="45" x2="880" y2="585"/>
    <line x1="690" y1="118" x2="1070" y2="512"/>
    <line x1="1070" y1="118" x2="690" y2="512"/>
    <line x1="691" y1="315" x2="1069" y2="315" transform="rotate(30,880,315)"/>
    <line x1="691" y1="315" x2="1069" y2="315" transform="rotate(60,880,315)"/>
    <line x1="691" y1="315" x2="1069" y2="315" transform="rotate(120,880,315)"/>
    <line x1="691" y1="315" x2="1069" y2="315" transform="rotate(150,880,315)"/>
  </g>

  <!-- Land masses (stylized flat earth continents, approximate) -->
  <g clip-path="url(#discClip)" fill="#e6d7a8" stroke="#b29d63" stroke-width="0.8" opacity="0.9">
    <!-- Europe/Asia blob -->
    <ellipse cx="920" cy="230" rx="70" ry="45" transform="rotate(-15,920,230)"/>
    <!-- Africa -->
    <ellipse cx="940" cy="330" rx="30" ry="50" transform="rotate(10,940,330)"/>
    <!-- North America -->
    <ellipse cx="800" cy="220" rx="50" ry="40" transform="rotate(20,800,220)"/>
    <!-- South America -->
    <ellipse cx="820" cy="360" rx="25" ry="45" transform="rotate(-5,820,360)"/>
    <!-- Australia -->
    <ellipse cx="1010" cy="350" rx="30" ry="22" transform="rotate(10,1010,350)"/>
  </g>

  <!-- Ice wall ring -->
  <circle cx="880" cy="315" r="265" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- Pin markers -->
  <g>
    <!-- Pin 1 -->
    <circle cx="920" cy="238" r="6" fill="#4ade80" stroke="#042f15" stroke-width="1.5"/>
    <!-- Pin 2 (guess nearby) -->
    <circle cx="932" cy="230" r="5" fill="white" stroke="#000" stroke-width="1.5"/>
    <line x1="920" y1="238" x2="932" y2="230" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="3 3"/>
    <!-- Pin 3 -->
    <circle cx="815" cy="228" r="6" fill="#4ade80" stroke="#042f15" stroke-width="1.5"/>
    <!-- Pin 4 -->
    <circle cx="830" cy="355" r="6" fill="#4ade80" stroke="#042f15" stroke-width="1.5"/>
    <!-- Pin 5 -->
    <circle cx="948" cy="342" r="6" fill="#4ade80" stroke="#042f15" stroke-width="1.5"/>
  </g>

  <!-- Left side: Title and description -->
  <text x="80" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="78" font-weight="800" fill="white" letter-spacing="-1">Flattap</text>

  <text x="82" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#ffd166" letter-spacing="0.5">🌍  Daily Flat-Earth Geography Game</text>

  <text x="82" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" fill="#8a93a8">Tap where you think it is — on the disc</text>

  <!-- Score preview row -->
  <rect x="80" y="340" width="450" height="64" rx="16" fill="rgba(8,18,44,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="106" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" fill="white">74🌞  96🏅  88😂  61🙃  100🎯</text>
  <text x="106" y="396" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#8a93a8">Final score: 419 / 500</text>

  <!-- Tagline -->
  <text x="82" y="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="#8a93a8">emibap.github.io/flattap</text>

  <!-- Flat earth badge -->
  <rect x="82" y="495" width="210" height="36" rx="18" fill="rgba(255,209,102,0.12)" stroke="#ffd166" stroke-width="1"/>
  <text x="106" y="518" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" fill="#ffd166">🧊  The Earth Is Flat. Probably.</text>

  <!-- Attribution -->
  <text x="1120" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" fill="#4a5368" text-anchor="end">tribute to maptap.gg</text>
</svg>
