<!doctype html>
<html lang="en">
<head>

<style>
  :root {
    --bg: #0b1020;
    --ink: #e9eef7;
    --dim: #8a93a8;
    --land: #e6d7a8;
    --landStroke: #b29d63;
    --grid: rgba(255,255,255,0.06);
    --accent: #ffd166;
    --good: #4ade80;
    --disc: #0f2a54;
    --glass: rgba(8,18,44,0.82);

    /* Round colour palette */
    --r1: #4ade80;
    --r2: #a78bfa;
    --r3: #ffd166;
    --r4: #f97316;
    --r5: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100svh;
    overflow: hidden;
    background: radial-gradient(ellipse at top, #162448 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ──────────────────────────────────────────── */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    gap: 8px;
  }
  .header-left { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
  header h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  header h1 .num { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .streak-badge { font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .meta-date { font-size: 11px; color: var(--dim); white-space: nowrap; }
  .mode-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
    background: rgba(255,209,102,0.12); color: var(--accent); border: 1px solid rgba(255,209,102,0.3);
    white-space: nowrap;
  }

  /* ── Main area ────────────────────────────────────────── */
  main {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    padding: 6px 12px;
    overflow: hidden;
  }

  /* ── Stats row (dots + score) ─────────────────────────── */
  .stats {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 16px;
    font-size: 13px; color: var(--dim);
  }
  .stats b { color: var(--ink); font-weight: 600; }
  .round-dots { display: flex; gap: 5px; align-items: center; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s ease, transform 0.2s ease;
  }
  .dot.current { background: white; transform: scale(1.3); }
  .dot.done { background: var(--good); }

  /* ── City prompt ──────────────────────────────────────── */
  .prompt {
    flex-shrink: 0;
    display: flex; align-items: baseline; gap: 8px;
    font-size: 14px; min-height: 36px;
    padding: 4px 14px; border-radius: 12px;
    transition: background 0.6s ease;
  }
  .prompt .find { color: var(--dim); }
  .prompt .city {
    font-size: 22px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.2px;
  }
  @keyframes cityIn {
    from { opacity: 0; transform: translateY(7px) scale(0.96); }
    to   { opacity: 1; transform: none; }
  }
  .city.entering { animation: cityIn 0.45s cubic-bezier(0.16,1,0.3,1) both; }

  /* ── The disc board ───────────────────────────────────── */
  .board {
    position: relative;
    flex-shrink: 1;
    width: min(92vw, calc(100svh - 165px), 760px);
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    box-shadow: 0 16px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  svg {
    width: 100%; height: 100%; display: block;
    cursor: crosshair;
    border-radius: 50%;
    overflow: hidden;
  }
  .disc         { fill: var(--disc); stroke: rgba(255,255,255,0.22); stroke-width: 1.2; }
  .land         { fill: var(--land); stroke: var(--landStroke); stroke-width: 0.5; }
  .graticule    { fill: none; stroke: var(--grid); stroke-width: 0.6; }
  .antarctic-ring { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 1; stroke-dasharray: 2 4; }
  .guess        { fill: #fff; stroke: #000; stroke-width: 1.5; }
  .target       { fill: var(--good); stroke: #042f15; stroke-width: 1.5; }
  .result-line  { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 4 4; }
  .map-label {
    font-size: 12px; font-weight: 700; fill: #fff;
    paint-order: stroke; stroke: #000; stroke-width: 3.5; stroke-linejoin: round;
    pointer-events: none;
  }

  /* ── Result toast ─────────────────────────────────────── */
  .result-toast {
    position: absolute;
    bottom: 9%; left: 50%; transform: translateX(-50%);
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding: 10px 22px 8px;
    text-align: center; min-width: 200px;
    pointer-events: none;
    opacity: 0; transition: opacity 0.25s ease;
  }
  .result-toast.visible { opacity: 1; }
  .result-toast .score-line {
    font-size: 24px; font-weight: 800; color: var(--accent); line-height: 1;
  }
  .result-toast .snarky-line {
    font-size: 12px; color: var(--ink); margin-top: 3px; font-style: italic;
    max-width: 240px;
  }
  .result-toast .dist-line {
    font-size: 11px; color: var(--dim); margin-top: 2px;
  }
  .result-toast .dist-line b { color: var(--ink); }
  @keyframes scorePop {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.18); }
    100% { transform: scale(1); opacity: 1; }
  }
  .score-line.popping { animation: scorePop 0.42s cubic-bezier(0.16,1,0.3,1) both; }

  /* Countdown bar */
  .countdown-track {
    height: 3px; background: rgba(255,255,255,0.12);
    border-radius: 3px; overflow: hidden; margin-top: 8px;
  }
  .countdown-fill { height: 100%; width: 100%; background: var(--accent); transform-origin: left; }
  @keyframes countdownShrink {
    from { width: 100%; }
    to   { width: 0%; }
  }
  .countdown-fill.running { animation: countdownShrink 2s linear forwards; }

  /* ── Drip stars ───────────────────────────────────────── */
  @keyframes dripStar {
    0%   { opacity: 1; transform: translateY(0) scale(1.2); }
    100% { opacity: 0; transform: translateY(55px) scale(0.5); }
  }
  .drip-star {
    position: absolute; pointer-events: none; z-index: 15;
    animation: dripStar 1.4s ease-in forwards;
    font-size: 15px;
  }

  /* ── Final overlay ────────────────────────────────────── */
  .final-overlay {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(8,15,38,0.9);
    backdrop-filter: blur(6px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; text-align: center; padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    overflow: hidden;
  }
  .final-overlay.visible { opacity: 1; pointer-events: all; }
  .final-overlay .grade-flavor {
    font-size: 13px; color: var(--dim); font-weight: 600; letter-spacing: 0.3px;
  }
  .final-overlay .total {
    font-size: clamp(34px, 8vw, 50px); font-weight: 800; color: var(--accent); line-height: 1;
  }
  .final-overlay .sub { color: var(--dim); font-size: 12px; }
  .final-overlay .pb-banner {
    font-size: 12px; color: var(--good); font-weight: 700;
    background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25);
    padding: 3px 12px; border-radius: 999px;
  }
  .round-scores { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .round-scores span {
    background: rgba(255,255,255,0.08);
    padding: 4px 10px; border-radius: 8px;
    font-weight: 600; font-size: 12px;
  }
  .final-buttons {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 2px;
  }
  .tomorrow-box {
    font-size: 11px; color: var(--dim); margin-top: 2px;
  }
  .tomorrow-box .countdown-next { color: var(--accent); font-weight: 700; font-size: 14px; }

  button {
    background: var(--accent); color: #1a1200;
    border: none; border-radius: 999px;
    padding: 9px 20px; font-size: 13px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.3px;
    transition: transform .08s ease, box-shadow .2s ease;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(255,209,102,0.3); }
  .btn-ghost {
    background: transparent; color: var(--accent);
    border: 1.5px solid rgba(255,209,102,0.5);
  }
  .btn-ghost:hover { box-shadow: 0 4px 12px rgba(255,209,102,0.15); }
  .btn-share.copied { color: var(--good); border-color: var(--good); }

  /* ── Practice button ─────────────────────────────────── */
  .practice-row {
    flex-shrink: 0;
    display: flex; justify-content: center;
  }
  .btn-practice {
    background: transparent; color: var(--dim);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px; padding: 5px 16px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .btn-practice:hover { color: var(--ink); border-color: rgba(255,255,255,0.3); transform: none; box-shadow: none; }

  .loading {
    position: absolute; inset: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--dim); background: var(--disc);
  }
  .zoom-hint {
    position: absolute; top: 8%; right: 7%;
    font-size: 11px; color: rgba(255,255,255,0.35);
    pointer-events: none; font-variant-numeric: tabular-nums;
  }

  footer {
    flex-shrink: 0;
    text-align: center; font-size: 11px; color: var(--dim);
    padding: 4px 20px 7px;
  }
  footer a { color: var(--dim); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Flattap <span class="num" id="puzzle-num">#1</span></h1>
    <span class="mode-tag" id="mode-tag">daily</span>
  </div>
  <div class="header-right">
    <span class="streak-badge" id="streak-display" style="display:none"></span>
    <span class="meta-date" id="header-date"></span>
  </div>
</header>

<main>
  <div class="stats">
    <div class="round-dots" id="round-dots">
      <span class="dot" id="dot-0"></span>
      <span class="dot" id="dot-1"></span>
      <span class="dot" id="dot-2"></span>
      <span class="dot" id="dot-3"></span>
      <span class="dot" id="dot-4"></span>
    </div>
    <div>Score <b id="score-total">0</b></div>
  </div>

  <div class="prompt" id="prompt">
    <span class="find">Find:</span>
    <span class="city" id="city-name">—</span>
  </div>

  <div class="board" id="board">
    <svg id="map" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet"></svg>

    <div class="result-toast" id="result-toast">
      <div class="score-line" id="round-score-line">+<span id="round-score">0</span></div>
      <div class="snarky-line" id="snarky-text"></div>
      <div class="dist-line">Off by <b id="dist-readout">—</b></div>
      <div class="countdown-track">
        <div class="countdown-fill" id="countdown-fill"></div>
      </div>
    </div>

    <div class="final-overlay" id="final-overlay">
      <div class="grade-flavor" id="grade-flavor"></div>
      <div class="total"><span id="final-total">0</span></div>
      <div class="sub" id="final-sub">out of 500</div>
      <div class="pb-banner" id="pb-banner" style="display:none">🏆 New personal best!</div>
      <div class="round-scores" id="round-breakdown"></div>
      <div class="final-buttons">
        <button class="btn-ghost btn-share" id="share-btn">Share 🔗</button>
        <button id="restart-btn">Play again</button>
      </div>
      <div class="tomorrow-box" id="tomorrow-box" style="display:none">
        <div>Next puzzle in <span class="countdown-next" id="next-countdown">—</span></div>
      </div>
    </div>

    <div class="loading" id="loading">Loading map…</div>
    <div class="zoom-hint" id="zoom-hint"></div>
  </div>

  <div class="practice-row">
    <button class="btn-practice" id="practice-btn">🎲 Practice round</button>
  </div>
</main>

<footer>
  Tribute to <a href="https://maptap.gg" target="_blank">maptap.gg</a> · flat-earth edition · scroll/pinch to zoom
</footer>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="cities.js"></script>
<script>
(function () {
  'use strict';

  // ─────────────────────────────────────────────────────────────────
  // CONSTANTS
  // ─────────────────────────────────────────────────────────────────
  const WIDTH = 800, HEIGHT = 800, CX = 400, CY = 400, DISC_RADIUS = 380;
  const NUM_ROUNDS = 5;
  const MAX_ROUND_SCORE = 100;
  const KM_PER_DISC_UNIT = Math.PI * 6371; // ~20,015 km when dist = DISC_RADIUS
  const HISTORY_KEY  = 'flattap_history';
  const STATS_KEY    = 'flattap_stats';
  const COMET_KEY    = 'flattap_comet_off'; // set to '1' to disable comet
  const FLATTAP_START = new Date(2026, 3, 13); // April 13 2026 = puzzle #0

  const ROUND_COLORS = ['#4ade80', '#a78bfa', '#ffd166', '#f97316', '#ef4444'];

  const EMOJI_GRADIENT = [
    '🌍','🌍','😵','🤢','😭','🤬','🥺','😒','😥','😪',
    '🥶','😶','😕','😞','😨','😟','😔','🤫','😑','😐',
    '🙃','🙂','😁','😂','🌞','🗺️','🧭','🏅','🏆','🎯'
  ];

  const SNARKY = {
    perfect: [
      'NASA is furious.',
      'The ice wall thanks you.',
      'Even the turtles holding up the disc applaud.',
      'Flat Earth Society wants to know your location.',
      "The firmament shed a single tear of joy."
    ],
    great: [
      "Closer than most conspiracy theorists manage.",
      "Even the turtles are impressed.",
      "Your compass works better than Neil Armstrong's.",
      "The disc gods smile upon you.",
      "Flat Earth Society approves. Probably."
    ],
    good: [
      "Your heart was in the right place. Your finger wasn't.",
      "Close enough to see the edge from there.",
      "Closer than the moon landing footage.",
      "Right continent. Solid flat-earth instincts.",
      "A mere hop across the disc."
    ],
    soso: [
      "The edge of the disc is that way. Keep walking.",
      "Right planet. Flat one. Small victories.",
      "You and the answer are in a long-distance relationship across the disc.",
      "Somewhere between here and the ice wall.",
      "The firmament is not impressed, but not appalled either."
    ],
    bad: [
      "Are you looking at the UN logo upside down?",
      "Did you fail flat-earth geography?",
      "The Flat Earth Society has rescinded your membership.",
      "Your mother would be so disappointed.",
      "At least you're on the same disc."
    ],
    reallybad: [
      "You're basically pointing at the ice wall.",
      "Even the firmament is laughing.",
      "Flat Earthers think you nailed it.",
      "The only thing your guess and the answer share is the disc.",
      "NASA wishes you worked for them."
    ],
    worst: [
      "Congratulations — you found the antipode. Which shouldn't exist on a flat Earth. Think about it.",
      "You've essentially pointed at the ice wall and called it a city.",
      "Beyond the ice wall. Impressive wrongness.",
      "Even the turtle at the bottom couldn't guess this badly.",
      "The firmament is filing a complaint."
    ]
  };

  let lastSnarkies = [];

  function getSnarkyText(distKm) {
    let tier;
    if (distKm < 50)        tier = 'perfect';
    else if (distKm < 300)  tier = 'great';
    else if (distKm < 900)  tier = 'good';
    else if (distKm < 2500) tier = 'soso';
    else if (distKm < 6500) tier = 'bad';
    else if (distKm < 13000) tier = 'reallybad';
    else                    tier = 'worst';

    const pool = SNARKY[tier].filter(t => !lastSnarkies.includes(t));
    const chosen = pool.length ? pool[Math.floor(Math.random() * pool.length)] : SNARKY[tier][0];
    lastSnarkies.push(chosen);
    if (lastSnarkies.length > 3) lastSnarkies.shift();
    return chosen;
  }

  function finalGradeFlavor(total) {
    if (total >= 480) return '🎯 FLAT EARTH MASTER';
    if (total >= 420) return '🏆 Disc Navigator';
    if (total >= 340) return '🗺️ Decent Flat-Earther';
    if (total >= 250) return '🙂 Getting Warmer';
    if (total >= 150) return "😅 The Earth is Flat… Your Score Isn't";
    return '🌍 Have You Tried Looking at a Map?';
  }

  function getEmoji(floatScore) {
    const idx = Math.min(
      EMOJI_GRADIENT.length - 1,
      Math.floor(floatScore * EMOJI_GRADIENT.length)
    );
    return EMOJI_GRADIENT[idx];
  }

  // ─────────────────────────────────────────────────────────────────
  // DATE & DAILY SEEDING
  // ─────────────────────────────────────────────────────────────────
  function getTodayKey() {
    const n = new Date();
    const y = n.getFullYear();
    const m = String(n.getMonth() + 1).padStart(2, '0');
    const d = String(n.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function getYesterdayKey() {
    const n = new Date();
    n.setDate(n.getDate() - 1);
    const y = n.getFullYear();
    const m = String(n.getMonth() + 1).padStart(2, '0');
    const d = String(n.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function getPuzzleId() {
    const n = new Date();
    const today = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    return Math.max(0, Math.floor((today - FLATTAP_START) / 86400000));
  }

  function seededRandom(seed) {
    const x = Math.sin(seed + 1) * 10000;
    return x - Math.floor(x);
  }

  function seededShuffle(arr, seed) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(seededRandom(seed * 97 + i * 31) * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function getDailyLocations() {
    const seed = getPuzzleId();
    const byContinent = {};
    cities.forEach(function(c) {
      if (!byContinent[c.continent]) byContinent[c.continent] = [];
      byContinent[c.continent].push(c);
    });

    const continents = Object.keys(byContinent);
    const shuffledContinents = seededShuffle(continents, seed);
    const picked5 = shuffledContinents.slice(0, NUM_ROUNDS);

    return picked5.map(function(continent, i) {
      const pool = byContinent[continent];
      const idx = Math.floor(seededRandom(seed * 1000 + i * 137) * pool.length);
      return pool[idx];
    });
  }

  function getPracticeLocations() {
    const byContinent = {};
    cities.forEach(function(c) {
      if (!byContinent[c.continent]) byContinent[c.continent] = [];
      byContinent[c.continent].push(c);
    });
    const continents = Object.keys(byContinent);
    // Shuffle continents randomly
    for (let i = continents.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = continents[i]; continents[i] = continents[j]; continents[j] = tmp;
    }
    const picked5 = continents.slice(0, NUM_ROUNDS);
    return picked5.map(function(continent) {
      const pool = byContinent[continent];
      return pool[Math.floor(Math.random() * pool.length)];
    });
  }

  // ─────────────────────────────────────────────────────────────────
  // PERSISTENCE
  // ─────────────────────────────────────────────────────────────────
  function saveDailyState() {
    if (!state || !state.isDaily) return;
    try {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
      history[state.dateKey] = {
        cityIds:  state.cities.map(function(c) { return c.id; }),
        round:    state.round,
        scores:   state.scores,
        done:     state.done || false
      };
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    } catch(e) {}
  }

  function loadDailyState() {
    try {
      const key = getTodayKey();
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
      const saved = history[key];
      if (!saved || !saved.cityIds) return null;

      const cityMap = {};
      cities.forEach(function(c) { cityMap[c.id] = c; });

      const locs = saved.cityIds.map(function(id) { return cityMap[id]; }).filter(Boolean);
      if (locs.length !== NUM_ROUNDS) return null;

      return {
        dateKey:      key,
        cities:       locs,
        round:        saved.round || 0,
        scores:       saved.scores || [],
        roundResolved: false,
        done:         saved.done || false,
        isDaily:      true
      };
    } catch(e) { return null; }
  }

  function loadStats() {
    try {
      return JSON.parse(localStorage.getItem(STATS_KEY) || '{"highScore":0,"streak":0,"lastPlay":"","over400":0,"over300":0,"over200":0}');
    } catch(e) { return { highScore: 0, streak: 0, lastPlay: '', over400: 0, over300: 0, over200: 0 }; }
  }

  function saveStats(stats) {
    try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch(e) {}
  }

  function updateStats(total) {
    const stats = loadStats();
    const today = getTodayKey();
    const yesterday = getYesterdayKey();

    if (stats.lastPlay === today) {
      // Already counted today — just return current streak
      return { isNewBest: false, streak: stats.streak };
    }

    if (stats.lastPlay === yesterday) {
      stats.streak = (stats.streak || 0) + 1;
    } else {
      stats.streak = 1;
    }
    stats.lastPlay = today;

    const isNewBest = total > (stats.highScore || 0);
    if (isNewBest) stats.highScore = total;

    if      (total >= 400) stats.over400 = (stats.over400 || 0) + 1;
    else if (total >= 300) stats.over300 = (stats.over300 || 0) + 1;
    else if (total >= 200) stats.over200 = (stats.over200 || 0) + 1;

    saveStats(stats);
    return { isNewBest: isNewBest, streak: stats.streak };
  }

  // ─────────────────────────────────────────────────────────────────
  // PROJECTION & SVG
  // ─────────────────────────────────────────────────────────────────
  const projection = d3.geoAzimuthalEquidistant()
    .rotate([0, -90])
    .translate([CX, CY])
    .scale(DISC_RADIUS / Math.PI)
    .clipAngle(180 - 1e-3);

  const path = d3.geoPath(projection);
  const svg  = d3.select('#map');

  svg.append('circle')
    .attr('class', 'disc')
    .attr('cx', CX).attr('cy', CY).attr('r', DISC_RADIUS);

  const zoomG = svg.append('g').attr('id', 'zoom-group');

  const graticule = d3.geoGraticule().step([15, 15]);
  zoomG.append('path').datum(graticule()).attr('class', 'graticule').attr('d', path);

  zoomG.append('circle')
    .attr('class', 'antarctic-ring')
    .attr('cx', CX).attr('cy', CY).attr('r', DISC_RADIUS - 2);

  const overlay = zoomG.append('g').attr('id', 'overlay');

  const hit = svg.append('circle')
    .attr('cx', CX).attr('cy', CY).attr('r', DISC_RADIUS)
    .attr('fill', 'transparent')
    .style('cursor', 'crosshair')
    .style('pointer-events', 'none');

  // ─────────────────────────────────────────────────────────────────
  // ZOOM
  // ─────────────────────────────────────────────────────────────────
  let currentTransform = d3.zoomIdentity;

  const zoom = d3.zoom()
    .scaleExtent([1, 8])
    .translateExtent([
      [CX - DISC_RADIUS, CY - DISC_RADIUS],
      [CX + DISC_RADIUS, CY + DISC_RADIUS]
    ])
    .on('zoom', function(event) {
      currentTransform = event.transform;
      zoomG.attr('transform', event.transform.toString());
      const z = event.transform.k;
      document.getElementById('zoom-hint').textContent = z === 1 ? '' : z.toFixed(1) + '×';
    });

  svg.call(zoom);

  // ─────────────────────────────────────────────────────────────────
  // GAME STATE
  // ─────────────────────────────────────────────────────────────────
  let state = null;
  let autoTimer = null;
  let nextCountdownTimer = null;

  function newDailyGame() {
    return {
      dateKey:       getTodayKey(),
      cities:        getDailyLocations(),
      round:         0,
      scores:        [],
      roundResolved: false,
      done:          false,
      isDaily:       true
    };
  }

  function newPracticeGame() {
    return {
      cities:        getPracticeLocations(),
      round:         0,
      scores:        [],
      roundResolved: false,
      done:          false,
      isDaily:       false
    };
  }

  // ─────────────────────────────────────────────────────────────────
  // UI HELPERS
  // ─────────────────────────────────────────────────────────────────
  function formatDate(d) {
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  function updateHeaderInfo() {
    const today = new Date();
    document.getElementById('header-date').textContent = formatDate(today);

    if (state && state.isDaily) {
      const pid = getPuzzleId();
      document.getElementById('puzzle-num').textContent = '#' + pid;
      document.getElementById('mode-tag').textContent = 'daily';
      document.getElementById('mode-tag').style.display = '';
    } else {
      document.getElementById('puzzle-num').textContent = '';
      document.getElementById('mode-tag').textContent = 'practice';
      document.getElementById('mode-tag').style.display = '';
    }
  }

  function updateStreakDisplay() {
    const stats = loadStats();
    const el = document.getElementById('streak-display');
    if (stats.streak >= 2) {
      el.textContent = '🔥 ' + stats.streak;
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  }

  function updateRoundDots(round) {
    for (let i = 0; i < NUM_ROUNDS; i++) {
      const dot = document.getElementById('dot-' + i);
      dot.className = 'dot';
      if (i < round)       dot.classList.add('done');
      else if (i === round) dot.classList.add('current');
    }
  }

  function updatePromptColor(round) {
    const col = ROUND_COLORS[round] || ROUND_COLORS[0];
    document.getElementById('prompt').style.background =
      'rgba(' + hexToRgb(col) + ',0.06)';
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return r + ',' + g + ',' + b;
  }

  function updateScoreDisplay() {
    const total = state.scores.reduce(function(a, b) { return a + b.score; }, 0);
    document.getElementById('score-total').textContent = String(total);
  }

  // ─────────────────────────────────────────────────────────────────
  // EFFECTS
  // ─────────────────────────────────────────────────────────────────

  // Drip stars
  function dripStars(count) {
    const board = document.getElementById('board');
    for (let i = 0; i < count; i++) {
      const star = document.createElement('span');
      star.className = 'drip-star';
      star.textContent = '⭐';
      const leftPct = 35 + Math.random() * 30; // near centre-top
      const topPct  = 6 + Math.random() * 6;
      star.style.left            = leftPct + '%';
      star.style.top             = topPct + '%';
      star.style.animationDelay  = (i * 120) + 'ms';
      star.style.animationDuration = (1.0 + Math.random() * 0.6) + 's';
      star.style.transform       = 'translateX(' + ((Math.random() - 0.5) * 50) + 'px)';
      board.appendChild(star);
      star.addEventListener('animationend', function() { star.remove(); });
    }
  }

  // Fireworks
  var FireworksManager = (function() {
    var canvas = null, ctx = null, particles = [], animId = null;

    function burst(x, y) {
      var colors = ['#ffd166','#4ade80','#a78bfa','#f97316','#fff','#ef4444'];
      for (var i = 0; i < 32; i++) {
        var angle = (i / 32) * Math.PI * 2;
        var spd = 2.5 + Math.random() * 5;
        particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - 2.5,
          life: 1,
          decay: 0.014 + Math.random() * 0.018,
          color: colors[Math.floor(Math.random() * colors.length)],
          size: 2 + Math.random() * 3
        });
      }
    }

    function animate() {
      if (!canvas) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(function(p) { return p.life > 0; });
      particles.forEach(function(p) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.18;
        p.life -= p.decay;
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      if (particles.length > 0) {
        animId = requestAnimationFrame(animate);
      } else {
        if (canvas) { canvas.remove(); canvas = null; }
        animId = null;
      }
    }

    return {
      launch: function() {
        if (!canvas) {
          canvas = document.createElement('canvas');
          canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;';
          canvas.width  = window.innerWidth;
          canvas.height = window.innerHeight;
          document.body.appendChild(canvas);
          ctx = canvas.getContext('2d');
        }
        var W = canvas.width, H = canvas.height;
        var delays = [0, 350, 700, 1050, 1400];
        delays.forEach(function(delay) {
          setTimeout(function() {
            burst(W * (0.15 + Math.random() * 0.7), H * (0.1 + Math.random() * 0.5));
          }, delay);
        });
        if (!animId) animate();
      }
    };
  })();

  // Comet effect
  var CometManager = (function() {
    var _shown = false;

    function shouldShow() {
      if (localStorage.getItem(COMET_KEY) === '1') return false;
      var stats = loadStats();
      if (!stats.lastPlay) return true; // first play ever
      var daysAgo = Math.floor((Date.now() - new Date(stats.lastPlay)) / 86400000);
      if (daysAgo >= 3) return true;    // returning after 3+ days
      return Math.random() < 0.25;
    }

    function run() {
      if (_shown) return;
      _shown = true;

      var canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;';
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      var ctx = canvas.getContext('2d');

      var W = canvas.width, H = canvas.height;
      var startX = -60, startY = H * (0.05 + Math.random() * 0.35);
      var angle  = 0.4 + Math.random() * 0.3; // ~25–45 degrees
      var dx = Math.cos(angle), dy = Math.sin(angle);
      var speed = 9, progress = 0;
      var tailLen = 90;

      function frame() {
        ctx.clearRect(0, 0, W, H);
        var x = startX + dx * progress * speed;
        var y = startY + dy * progress * speed;

        if (x > W + 120) { canvas.remove(); return; }

        // Tail
        var grad = ctx.createLinearGradient(
          x - dx * tailLen, y - dy * tailLen, x, y
        );
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.7, 'rgba(200,220,255,0.4)');
        grad.addColorStop(1, 'rgba(255,255,255,0.85)');
        ctx.beginPath();
        ctx.moveTo(x - dx * tailLen, y - dy * tailLen);
        ctx.lineTo(x, y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Head glow
        var hGlow = ctx.createRadialGradient(x, y, 0, x, y, 8);
        hGlow.addColorStop(0, 'rgba(255,255,255,0.9)');
        hGlow.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fillStyle = hGlow;
        ctx.fill();

        // Head
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'white';
        ctx.fill();

        progress++;
        requestAnimationFrame(frame);
      }

      // Delay so it appears between round 1 and round 3
      var delay = 6000 + Math.random() * 12000;
      setTimeout(function() { requestAnimationFrame(frame); }, delay);
    }

    return {
      maybeInit: function() {
        if (shouldShow()) run();
      }
    };
  })();

  // ─────────────────────────────────────────────────────────────────
  // GAME LOGIC
  // ─────────────────────────────────────────────────────────────────
  function startRound() {
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

    overlay.selectAll('*').remove();
    document.getElementById('result-toast').classList.remove('visible');
    document.getElementById('final-overlay').classList.remove('visible');

    updateRoundDots(state.round);
    updatePromptColor(state.round);
    updateScoreDisplay();

    const cityEl = document.getElementById('city-name');
    cityEl.classList.remove('entering');
    void cityEl.offsetWidth;
    cityEl.textContent = state.cities[state.round].name;
    cityEl.classList.add('entering');

    state.roundResolved = false;
    hit.style('pointer-events', 'all');

    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
    saveDailyState();
  }

  function resolveRound(mapX, mapY) {
    if (state.roundResolved) return;
    state.roundResolved = true;
    hit.style('pointer-events', 'none');

    const city = state.cities[state.round];
    const projected = projection([city.lon, city.lat]);
    if (!projected) { nextOrFinish(); return; }
    const [tx, ty] = projected;

    // Distance in SVG disc units
    const dist = Math.hypot(mapX - tx, mapY - ty);

    // km display (azimuthal equidistant property: DISC_RADIUS = half Earth circumference)
    const distKm = Math.round(dist * KM_PER_DISC_UNIT / DISC_RADIUS);

    // Float score (0–1) and integer score (0–100)
    const floatScore = Math.exp(-dist / (DISC_RADIUS * 0.36));
    const score      = Math.max(0, Math.round(MAX_ROUND_SCORE * floatScore));

    state.scores.push({ score: score, floatScore: floatScore, distKm: distKm, cityName: city.name });
    saveDailyState();

    // ── Animated result line ──────────────────────────────────────
    const lineNode = overlay.append('line')
      .attr('class', 'result-line')
      .attr('x1', mapX).attr('y1', mapY)
      .attr('x2', tx).attr('y2', ty);

    const lineLen = Math.hypot(tx - mapX, ty - mapY) + 1;
    lineNode
      .style('stroke-dasharray', lineLen)
      .style('stroke-dashoffset', lineLen);
    lineNode.transition().duration(550).ease(d3.easeLinear)
      .style('stroke-dashoffset', 0);

    overlay.append('circle').attr('class', 'guess')
      .attr('cx', mapX).attr('cy', mapY).attr('r', 6);
    overlay.append('circle').attr('class', 'target')
      .attr('cx', tx).attr('cy', ty).attr('r', 7);
    overlay.append('text').attr('class', 'map-label')
      .attr('x', tx + 10).attr('y', ty - 10)
      .text(city.name);

    // ── Toast ─────────────────────────────────────────────────────
    const distStr = distKm < 1 ? '< 1 km' : distKm.toLocaleString() + ' km';
    document.getElementById('dist-readout').textContent = distStr;
    document.getElementById('round-score').textContent = String(score);

    // Score pop animation
    const scoreLine = document.getElementById('round-score-line');
    scoreLine.classList.remove('popping');
    void scoreLine.offsetWidth;
    scoreLine.classList.add('popping');

    // Snarky text
    document.getElementById('snarky-text').textContent = getSnarkyText(distKm);

    updateScoreDisplay();

    const toast = document.getElementById('result-toast');
    toast.classList.add('visible');

    const fill = document.getElementById('countdown-fill');
    fill.classList.remove('running');
    void fill.offsetWidth;
    fill.classList.add('running');

    // Drip stars if great score
    if (score >= 85) dripStars(4);

    autoTimer = setTimeout(function() {
      autoTimer = null;
      nextOrFinish();
    }, 2000);
  }

  function nextOrFinish() {
    if (state.round + 1 >= NUM_ROUNDS) {
      state.done = true;
      saveDailyState();
      showFinal(false);
    } else {
      state.round++;
      startRound();
    }
  }

  function showFinal(alreadyDone) {
    document.getElementById('result-toast').classList.remove('visible');

    const total = state.scores.reduce(function(a, b) { return a + b.score; }, 0);
    document.getElementById('final-total').textContent = String(total);

    // Grade flavor
    document.getElementById('grade-flavor').textContent = finalGradeFlavor(total);

    // Sub-label
    document.getElementById('final-sub').textContent = 'out of 500';

    // Round breakdown
    const breakdown = document.getElementById('round-breakdown');
    breakdown.innerHTML = '';
    state.scores.forEach(function(s, i) {
      const el = document.createElement('span');
      el.textContent = s.score + getEmoji(s.floatScore);
      breakdown.appendChild(el);
    });

    // Stats + personal best (only for new completions)
    const pbBanner = document.getElementById('pb-banner');
    pbBanner.style.display = 'none';

    if (state.isDaily && !alreadyDone) {
      const result = updateStats(total);
      updateStreakDisplay();
      if (result.isNewBest && total > 0) {
        pbBanner.style.display = '';
      }
      // Fireworks for great scores
      if (total > 399) {
        setTimeout(function() { FireworksManager.launch(); }, 300);
      }
    }

    // "Come back tomorrow" box
    const tomorrowBox = document.getElementById('tomorrow-box');
    if (state.isDaily) {
      tomorrowBox.style.display = '';
      startNextCountdown();
    } else {
      tomorrowBox.style.display = 'none';
    }

    // All dots filled
    updateRoundDots(NUM_ROUNDS);

    document.getElementById('final-overlay').classList.add('visible');
  }

  function startNextCountdown() {
    if (nextCountdownTimer) clearInterval(nextCountdownTimer);

    function tick() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setDate(midnight.getDate() + 1);
      midnight.setHours(0, 0, 0, 0);
      const ms = midnight - now;
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const str = String(h).padStart(2,'0') + ':' +
                  String(m).padStart(2,'0') + ':' +
                  String(s).padStart(2,'0');
      const el = document.getElementById('next-countdown');
      if (el) el.textContent = str;
    }
    tick();
    nextCountdownTimer = setInterval(tick, 1000);
  }

  // ─────────────────────────────────────────────────────────────────
  // CLICK HANDLER
  // ─────────────────────────────────────────────────────────────────
  hit.on('click', function(event) {
    const [sx, sy] = d3.pointer(event, svg.node());
    const [mx, my] = currentTransform.invert([sx, sy]);
    if (Math.hypot(mx - CX, my - CY) > DISC_RADIUS) return;
    resolveRound(mx, my);
  });

  // ─────────────────────────────────────────────────────────────────
  // SHARE
  // ─────────────────────────────────────────────────────────────────
  function buildShareText() {
    const total  = state.scores.reduce(function(a, b) { return a + b.score; }, 0);
    const today  = new Date();
    const dateStr = formatDate(today);
    const pid    = state.isDaily ? getPuzzleId() : null;
    const header = pid !== null
      ? 'Flattap #' + pid + ' · ' + dateStr
      : 'Flattap · ' + dateStr + ' (practice)';
    const scoreRow = state.scores.map(function(s) {
      return s.score + getEmoji(s.floatScore);
    }).join(' ');
    return header + '\n' + scoreRow + '\nFinal score: ' + total +
      '\nhttps://emibap.github.io/flattap/';
  }

  document.getElementById('share-btn').addEventListener('click', async function() {
    const text = buildShareText();
    const btn  = document.getElementById('share-btn');

    if (navigator.share) {
      try { await navigator.share({ text: text }); } catch(e) {}
    } else {
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Share 🔗';
          btn.classList.remove('copied');
        }, 2000);
      } catch(e) {
        window.prompt('Copy your score:', text);
      }
    }
  });

  // ─────────────────────────────────────────────────────────────────
  // RESTART / PRACTICE BUTTONS
  // ─────────────────────────────────────────────────────────────────
  document.getElementById('restart-btn').addEventListener('click', function() {
    if (state && state.isDaily) {
      // If daily already done, switch to practice
      state = newPracticeGame();
    } else {
      state = newPracticeGame();
    }
    updateHeaderInfo();
    startRound();
  });

  document.getElementById('practice-btn').addEventListener('click', function() {
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    state = newPracticeGame();
    updateHeaderInfo();
    document.getElementById('final-overlay').classList.remove('visible');
    startRound();
  });

  // ─────────────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────────────
  function init() {
    updateStreakDisplay();

    // Check for saved daily state
    const saved = loadDailyState();
    if (saved && saved.done) {
      // Already played today — show results
      state = saved;
      updateHeaderInfo();
      showFinal(true);
    } else if (saved && saved.round > 0) {
      // Resume in-progress game
      state = saved;
      updateHeaderInfo();
      startRound();
    } else {
      // New daily game
      state = newDailyGame();
      updateHeaderInfo();
      startRound();
      CometManager.maybeInit();
    }
  }

  // ─────────────────────────────────────────────────────────────────
  // LOAD MAP & START
  // ─────────────────────────────────────────────────────────────────
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json')
    .then(function(r) { return r.json(); })
    .then(function(land) {
      const landFeature = topojson.feature(land, land.objects.land);
      zoomG.insert('path', '#overlay')
        .datum(landFeature)
        .attr('class', 'land')
        .attr('d', path);

      document.getElementById('loading').style.display = 'none';
      init();
    })
    .catch(function(err) {
      document.getElementById('loading').textContent = 'Map needs internet. ' + err.message;
    });

})();
</script>
